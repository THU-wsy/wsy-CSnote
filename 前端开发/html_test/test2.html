<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        文本框：<input type="text" placeholder="输入信息"> <br>
        密码框：<input type="password"> <br>
        单选框: 
        <label><input type="radio" name="性别" checked>男</label>
        <label><input type="radio" name="性别">女 </label>
        <br>
        多选框: 
            <input type="checkbox"> 女巫
            <input type="checkbox"> 猎人
            <input type="checkbox"> 狼人
            <input type="checkbox" checked> 村民
        <br>
        上传文件: <input type="file" multiple> <br>
        下拉菜单：
            <select>
                <option>女巫</option>
                <option>猎人</option>
                <option>狼人</option>
                <option selected>村民</option>
            </select>
        <br>
        文本域：
            <textarea>请输入内容</textarea>
        <br>
        <button>提交</button>
        <button type="reset">重置</button>
    </form>
</body>
</html>
